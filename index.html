<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Studentische Hilfskraft Deutsch</title>
  <style>
    /* ── reset / base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --black:   #1a1a1a;
      --red:     #cc0000;
      --gold:    #ffcc00;
      --light:   #f5f5f5;
      --white:   #ffffff;
      --shadow:  rgba(0,0,0,.12);

      --a1-color:  #2ecc71;
      --a2-color:  #3498db;
      --b1-color:  #e67e22;
      --b2-color:  #9b59b6;

      --active-level: var(--a1-color);
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--light);
      height: 100dvh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── header ── */
    header {
      background: var(--black);
      padding: 0 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-shrink: 0;
      height: 56px;
    }
    .flag {
      display: flex;
      flex-direction: column;
      width: 28px;
      height: 20px;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,.4);
    }
    .flag span { flex: 1; }
    .flag .s1 { background: #222; }
    .flag .s2 { background: #cc0000; }
    .flag .s3 { background: #ffcc00; }

    header h1 {
      color: var(--white);
      font-size: 1.15rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    header h1 span { color: var(--gold); }

    /* ── level selector ── */
    .level-bar {
      background: var(--white);
      border-bottom: 1px solid #e0e0e0;
      padding: .65rem 1.5rem;
      display: flex;
      align-items: center;
      gap: .75rem;
      flex-wrap: wrap;
      flex-shrink: 0;
    }
    .level-bar label {
      font-size: .8rem;
      font-weight: 600;
      color: #555;
      text-transform: uppercase;
      letter-spacing: .08em;
    }
    .level-btns { display: flex; gap: .5rem; flex-wrap: wrap; }

    .lvl-btn {
      border: 2px solid transparent;
      border-radius: 999px;
      padding: .3rem .95rem;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: all .18s;
      background: var(--light);
      color: #555;
    }
    .lvl-btn[data-level="A1"] { --c: var(--a1-color); }
    .lvl-btn[data-level="A2"] { --c: var(--a2-color); }
    .lvl-btn[data-level="B1"] { --c: var(--b1-color); }
    .lvl-btn[data-level="B2"] { --c: var(--b2-color); }

    .lvl-btn:hover { border-color: var(--c); color: var(--c); }
    .lvl-btn.active {
      background: var(--c);
      border-color: var(--c);
      color: #fff;
      box-shadow: 0 2px 8px color-mix(in srgb, var(--c) 40%, transparent);
    }

    .level-info {
      margin-left: auto;
      font-size: .78rem;
      color: #888;
      font-style: italic;
    }
    #vocab-count {
      font-weight: 700;
      color: #444;
    }

    /* ── chat area ── */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 1.25rem 1.5rem;
      display: flex;
      flex-direction: column;
      gap: .75rem;
      scroll-behavior: smooth;
    }

    .msg {
      display: flex;
      gap: .6rem;
      align-items: flex-end;
      max-width: 78%;
    }
    .msg.user  { align-self: flex-end; flex-direction: row-reverse; }
    .msg.bot   { align-self: flex-start; }

    .avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .9rem;
      flex-shrink: 0;
    }
    .msg.user  .avatar { background: #ddd; }
    .msg.bot   .avatar { background: var(--black); }

    .bubble {
      padding: .6rem .9rem;
      border-radius: 16px;
      line-height: 1.55;
      font-size: .93rem;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: var(--active-level, var(--a1-color));
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .msg.bot .bubble {
      background: var(--white);
      color: var(--black);
      border-bottom-left-radius: 4px;
      box-shadow: 0 1px 4px var(--shadow);
    }
    .msg.bot .bubble.typing::after {
      content: '▌';
      animation: blink .7s steps(1) infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }

    /* level badge on bot messages */
    .lvl-badge {
      display: inline-block;
      font-size: .65rem;
      font-weight: 700;
      padding: .1em .45em;
      border-radius: 999px;
      margin-bottom: .3rem;
      color: #fff;
    }

    /* ── input area ── */
    .input-area {
      background: var(--white);
      border-top: 1px solid #e0e0e0;
      padding: .75rem 1.5rem;
      display: flex;
      gap: .6rem;
      align-items: flex-end;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      border: 1.5px solid #d0d0d0;
      border-radius: 12px;
      padding: .55rem .85rem;
      font-size: .93rem;
      resize: none;
      outline: none;
      max-height: 120px;
      overflow-y: auto;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color .18s;
    }
    #user-input:focus { border-color: var(--active-level, var(--a1-color)); }

    #send-btn {
      width: 40px; height: 40px;
      border-radius: 50%;
      background: var(--black);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: background .18s, transform .1s;
    }
    #send-btn:hover  { background: #333; }
    #send-btn:active { transform: scale(.93); }
    #send-btn svg { fill: white; width: 18px; height: 18px; }
    #send-btn:disabled { background: #bbb; cursor: not-allowed; }

    /* ── empty state ── */
    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: .6rem;
      color: #aaa;
      font-size: .9rem;
      user-select: none;
    }
    .empty-state svg { opacity: .35; }
    .empty-state p { text-align: center; max-width: 260px; line-height: 1.5; }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <div class="flag" aria-hidden="true">
    <span class="s1"></span>
    <span class="s2"></span>
    <span class="s3"></span>
  </div>
  <h1><span>Studentische</span> <span>Hilfskraft</span> <span>Deutsch Lernen</span></h1>
</header>

<!-- ── Level selector ── -->
<div class="level-bar">
  <label>Niveau:</label>
  <div class="level-btns">
    <button class="lvl-btn active" data-level="A1">A1 — Anfänger</button>
    <button class="lvl-btn"        data-level="A2">A2 — Grundstufe</button>
    <button class="lvl-btn"        data-level="B1">B1 — Mittelstufe</button>
    <button class="lvl-btn"        data-level="B2">B2 — Obere Mittelstufe</button>
  </div>
  <span class="level-info">Wortschatz: <span id="vocab-count">603 Stämme</span></span>
</div>

<!-- ── Messages ── -->
<div id="messages">
  <div class="empty-state" id="empty">
    <svg xmlns="http://www.w3.org/2000/svg" width="52" height="52" viewBox="0 0 24 24">
      <path d="M20 2H4c-1.1 0-2 .9-2 2v18l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/>
    </svg>
    <p>Wähle ein Niveau und schreibe deine erste Nachricht auf Deutsch!</p>
  </div>
</div>

<!-- ── Input ── -->
<div class="input-area">
  <textarea id="user-input" rows="1" placeholder="Schreib auf Deutsch…" aria-label="Nachricht"></textarea>
  <button id="send-btn" aria-label="Senden">
    <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
  </button>
</div>

<script>
  // ── State ──────────────────────────────────────────────────────────────────
  let currentLevel = 'A1';
  let history = [];          // [{role, content}, ...]
  let isGenerating = false;

  const vocabCounts = {
    A1: '603',
    A2: '2.022',
    B1: '5.557',
    B2: 'unbegrenzt',
  };
  const levelColors = {
    A1: 'var(--a1-color)',
    A2: 'var(--a2-color)',
    B1: 'var(--b1-color)',
    B2: 'var(--b2-color)',
  };
  const levelLabels = {
    A1: 'Nur A1-Wörter',
    A2: 'A1 + A2-Wörter',
    B1: 'A1 + A2 + B1-Wörter',
    B2: 'Keine Einschränkung',
  };

  // ── DOM refs ───────────────────────────────────────────────────────────────
  const messagesEl  = document.getElementById('messages');
  const inputEl     = document.getElementById('user-input');
  const sendBtn     = document.getElementById('send-btn');
  const vocabCount  = document.getElementById('vocab-count');
  const emptyState  = document.getElementById('empty');
  const lvlBtns     = document.querySelectorAll('.lvl-btn');

  // ── Level buttons ──────────────────────────────────────────────────────────
  lvlBtns.forEach(btn => {
    btn.addEventListener('click', () => {
      if (isGenerating) return;
      currentLevel = btn.dataset.level;
      lvlBtns.forEach(b => b.classList.toggle('active', b === btn));
      // Update CSS variable for user bubble colour
      document.documentElement.style.setProperty(
        '--active-level', levelColors[currentLevel]
      );
      vocabCount.textContent =
        vocabCounts[currentLevel] + (currentLevel === 'B2' ? '' : ' Stämme');
      // Reset conversation when level changes
      history = [];
      messagesEl.innerHTML = '';
      messagesEl.appendChild(emptyState);
      emptyState.style.display = '';
    });
  });

  // ── Auto-grow textarea ─────────────────────────────────────────────────────
  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
  sendBtn.addEventListener('click', sendMessage);

  // ── Helpers ────────────────────────────────────────────────────────────────
  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function addMessage(role, text, level) {
    emptyState.style.display = 'none';

    const wrap = document.createElement('div');
    wrap.className = `msg ${role}`;

    const avatar = document.createElement('div');
    avatar.className = 'avatar';
    avatar.textContent = role === 'user' ? '🧑' : '🤖';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (role === 'bot') {
      const badge = document.createElement('span');
      badge.className = 'lvl-badge';
      badge.style.background = levelColors[level || currentLevel];
      badge.textContent = levelLabels[level || currentLevel];
      bubble.appendChild(badge);
      bubble.appendChild(document.createElement('br'));
    }

    const textNode = document.createTextNode(text || '');
    bubble.appendChild(textNode);

    wrap.appendChild(avatar);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    scrollToBottom();
    return { bubble, textNode };
  }

  // ── Send message ───────────────────────────────────────────────────────────
  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text || isGenerating) return;

    // Show user bubble
    addMessage('user', text);
    inputEl.value = '';
    inputEl.style.height = 'auto';
    history.push({ role: 'user', content: text });

    // Show bot typing bubble
    const { bubble: botBubble, textNode: botText } = addMessage('bot', '', currentLevel);
    botBubble.classList.add('typing');

    isGenerating = true;
    sendBtn.disabled = true;
    inputEl.disabled = true;

    let full = '';
    try {
      const res = await fetch('/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          level: currentLevel,
          history: history.slice(-8),
        }),
      });

      if (!res.ok) throw new Error(`HTTP ${res.status}`);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        // Parse SSE lines
        const lines = buffer.split('\n');
        buffer = lines.pop(); // keep incomplete last line

        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const payload = JSON.parse(line.slice(6));
          if (payload.token) {
            full += payload.token;
            botText.textContent = full;
            scrollToBottom();
          }
          if (payload.done) {
            full = payload.full || full;
            botText.textContent = full;
          }
          if (payload.error) {
            botText.textContent = `[Fehler: ${payload.error}]`;
          }
        }
      }
    } catch (err) {
      botText.textContent = `[Verbindungsfehler: ${err.message}]`;
    } finally {
      botBubble.classList.remove('typing');
      history.push({ role: 'assistant', content: full });
      isGenerating = false;
      sendBtn.disabled = false;
      inputEl.disabled = false;
      inputEl.focus();
      scrollToBottom();
    }
  }
</script>
</body>
</html>
